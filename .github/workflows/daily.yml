name: Daily update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * *" # Hong Kong time 06:00 daily (UTC 22:00)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch and build data
        if: github.event_name != 'push'
        env:
          POCKET_GAME_ID: "POCKET"
          PYTHONUTF8: "1"
          UNLIMITED_DAYS: "false"
          DAYS_BACK: "30"
          MIN_PLAYERS: "64"
          FULL_REBUILD: "false"
        run: |
          set -e
          python scripts/fetch_raw_data.py
          python scripts/process_data.py
          python scripts/build_tournament_pages.py
          python scripts/extract_tournament_players.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Vue site into /docs
        run: |
          cd web
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
